name: Refresh Events

on:
  schedule:
    # Cada 30 minutos, de 6am a 10pm (horario mercados)
    - cron: '*/30 6-22 * * 1-5'  # Lunes a Viernes
  workflow_dispatch:  # Permitir ejecución manual

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Call Refresh Endpoint
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "X-API-Key: ${{ secrets.REFRESH_API_KEY }}" \
            "https://scalpertoday-ruben.azurewebsites.net/api/v1/macro/refresh")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "Response: $body"
          echo "HTTP Code: $http_code"

          if [ "$http_code" != "200" ]; then
            echo "Error: Request failed with status $http_code"
            exit 1
          fi
